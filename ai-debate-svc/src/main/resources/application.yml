server:
  port: 8083

spring:
  application:
    name: ai-debate-svc
  # Phase 6 완료: docker-compose에서 SPRING_PROFILES_ACTIVE=prod 로 주입
  # 로컬 단독 실행 시 mock 사용: SPRING_PROFILES_ACTIVE=mock ./gradlew bootRun
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:mock}

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: debate-svc-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      enable-auto-commit: false
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      # debateId 기반 파티션 키 설정 (Gate 2 Kafka 순서 보장 대응)
      acks: all
      retries: 3

anthropic:
  api-key: ${ANTHROPIC_API_KEY}
  model: claude-sonnet-4-20250514

logging:
  level:
    com.invest.debate: DEBUG
    org.springframework.kafka: INFO
